<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشاهين كاش</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; }
header { background-color: #002147; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
header img { height: 50px; }
.balance { background-color: #001735; padding: 5px 10px; border-radius: 20px; font-weight: bold; }
main { padding: 20px; }
.section { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
.card { background-color: #001735; width: 180px; height: 180px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
.card:hover { transform: scale(1.05); box-shadow: 0 0 20px #00bcd4; }
.card img { width: 60px; height: 60px; margin-bottom: 10px; }
.card span { text-align: center; font-size: 14px; font-weight: bold; }
nav { position: fixed; bottom: 0; width: 100%; background-color: #002147; display: flex; justify-content: space-around; padding: 10px 0; }
nav button { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
</style>
</head>
<body>
<header>
<img src="images/logo.png" alt="الشاهين كاش">
<div class="balance">$0.00</div>
</header>
<main>
<div class="section">
<div class="card" onclick="window.location.href='pages/chat.html'">
<img src="images/chat.png" alt="Chat World">
<span>Chat World - عالم الشات</span>
</div>
<div class="card" onclick="window.location.href='pages/games.html'">
<img src="images/games.png" alt="Games World">
<span>Games World - عالم الألعاب</span>
</div>
<div class="card" onclick="window.location.href='pages/giftcards.html'">
<img src="images/giftcards.png" alt="Gift Cards World">
<span>Gift Cards World - عالم البطاقات</span>
</div>
<div class="card" onclick="window.location.href='pages/tele.html'">
<img src="images/telecom.png" alt="Tele World">
<span>Tele World - عالم الاتصالات</span>
</div>
</div>
</main>
<nav>
<button onclick="alert('بحث')">🔍</button>
<button onclick="alert('سلة المشتريات')">🛒</button>
<button onclick="alert('الإشعارات')">🔔</button>
<button onclick="alert('المحفظة')">💰</button>
<button onclick="alert('الصفحة الرئيسية')">🏠</button>
</nav>
</body>
</html>
